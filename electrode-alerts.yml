groups:
  - name: electrode.rules
    rules:
      # High request rate alert
      - alert: HighHTTPRequestRate
        expr: rate(http_requests_total{job="electrode-app"}[5m]) > 50
        for: 2m
        labels:
          severity: warning
          service: electrode-app
        annotations:
          summary: "High HTTP request rate detected"
          description: "HTTP request rate is {{ $value }} requests/sec, which is above the threshold of 50 req/sec"

      # High response time alert
      - alert: HighResponseTime
        expr: rate(http_request_duration_seconds_sum{job="electrode-app"}[5m]) / rate(http_request_duration_seconds_count{job="electrode-app"}[5m]) > 1.0
        for: 5m
        labels:
          severity: critical
          service: electrode-app
        annotations:
          summary: "High response time detected"
          description: "Average response time is {{ $value }}s, which is above the threshold of 1.0s"

      # High memory usage alert
      - alert: HighMemoryUsage
        expr: nodejs_heap_size_used_bytes{job="electrode-app"} / 1024 / 1024 > 500
        for: 3m
        labels:
          severity: warning
          service: electrode-app
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}MB, which is above the threshold of 500MB"

      # Application down alert
      - alert: ElectrodeAppDown
        expr: up{job="electrode-app"} == 0
        for: 1m
        labels:
          severity: critical
          service: electrode-app
        annotations:
          summary: "Electrode application is down"
          description: "The electrode application has been down for more than 1 minute"

      # High error rate alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{job="electrode-app",status_code=~"5.."}[5m]) / rate(http_requests_total{job="electrode-app"}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          service: electrode-app
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}, which is above the threshold of 10%"

      # Slow electrode operations
      - alert: SlowElectrodeOperations
        expr: rate(electrode_operation_duration_seconds_sum{job="electrode-app"}[5m]) / rate(electrode_operation_duration_seconds_count{job="electrode-app"}[5m]) > 2.0
        for: 3m
        labels:
          severity: warning
          service: electrode-app
        annotations:
          summary: "Slow electrode operations detected"
          description: "Average electrode operation duration is {{ $value }}s, which is above the threshold of 2.0s"
