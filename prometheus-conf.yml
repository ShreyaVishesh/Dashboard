global:
  scrape_interval: 10s

rule_files:
  - "rules.yaml"
  - "electrode-alerts.yml"
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 18.18.18.214:9093

scrape_configs:
  - job_name: "prometheus"
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node_exporter:9100"]
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "electrode-app"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: "/metrics"
